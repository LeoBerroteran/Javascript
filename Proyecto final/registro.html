<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro - Catálogo Web</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
  <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
    <h2 class="text-2xl font-bold mb-6 text-center text-gray-800">Crear una Cuenta</h2>
    <form id="registroForm" class="space-y-4">
      <div>
        <label for="nombre" class="block text-sm font-medium text-gray-700">Nombre Completo</label>
        <input type="text" id="nombre" required class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md">
      </div>
      <div>
        <label for="email" class="block text-sm font-medium text-gray-700">Correo Electrónico</label>
        <input type="email" id="email" required class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md">
      </div>
      <div>
        <label for="password" class="block text-sm font-medium text-gray-700">Contraseña</label>
        <input type="password" id="password" required class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md">
      </div>
      <div id="mensajeError" class="text-red-500 text-sm hidden"></div>
      <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-4 rounded-md">Registrarse</button>
    </form>
    <p class="mt-4 text-center text-sm text-gray-600">
      ¿Ya tienes cuenta? <a href="login.html" class="font-medium text-blue-600 hover:text-blue-500">Inicia sesión aquí</a>
    </p>
  </div>
  <script src="db.js"></script>
  <script src="auth.js"></script>
</body>
</html>
