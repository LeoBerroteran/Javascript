<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mi Perfil</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="guard.js"></script>
</head>
<body class="bg-gray-100 flex flex-col min-h-screen">
  <nav class="bg-gray-900 text-white p-4 shadow-md">
    <div class="container mx-auto flex justify-between items-center">
      <h1 class="text-xl font-bold">Mi Perfil</h1>
      <a href="catalogo.html" class="hover:text-blue-300 text-sm">Volver al Catálogo</a>
    </div>
  </nav>
  <main class="flex-grow flex items-center justify-center p-4">
    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
      <h2 class="text-2xl font-bold mb-6 text-center">Actualizar Datos</h2>
      <form id="perfilForm" class="space-y-4">
       <div>
         <label class="block text-sm">Nombre Completo</label>
         <input type="text" id="perfilNombre" required class="mt-1 w-full px-3 py-2 border rounded-md">
       </div>
        <div>
          <label class="block text-sm">Correo (No modificable)</label>
          <input type="email" id="perfilEmail" disabled class="mt-1 w-full px-3 py-2 border rounded-md bg-gray-100">
        </div>
        <div>
          <label class="block text-sm">Nueva Contraseña</label>
          <input type="password" id="perfilPassword" required class="mt-1 w-full px-3 py-2 border rounded-md">
        </div>
        <div id="mensajePerfil" class="text-sm text-center hidden"></div>
        <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-md font-medium">Guardar Cambios</button>
      </form>
    </div>
  </main>
  <script src="db.js"></script>
  <script src="perfil.js"></script>
</body>
</html>
